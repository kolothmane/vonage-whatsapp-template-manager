services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vonage_templates
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vonage_templates"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vonage_templates?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-this-in-production
      VONAGE_API_KEY: ${VONAGE_API_KEY:-}
      VONAGE_API_SECRET: ${VONAGE_API_SECRET:-}
      VONAGE_APPLICATION_ID: ${VONAGE_APPLICATION_ID:-}
      VONAGE_PRIVATE_KEY: ${VONAGE_PRIVATE_KEY:-}
    ports:
      - "3000:3000"

volumes:
  postgres-data:
